services:
  git-service:
    image: ghcr.io/gitstore-dev/git-service
    build:
      context: .
      dockerfile: docker/git-service.Dockerfile
    container_name: gitstore-git-service
    ports:
      - "50051:50051"  # gRPC
    volumes:
      - git-repo-data-root:/data/repos
    environment:
      - GITSTORE_GRPC__PORT=50051
      - GITSTORE_GIT__DATA_DIR=/data/repos
      - GITSTORE_LOG__LEVEL=info
      - GITSTORE_LOG__FORMAT=json
      - GITSTORE_GIT__REPO__MAX_FILE_SIZE=52428800
    networks:
      - gitstore-network

  api:
    image: ghcr.io/gitstore-dev/api
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: gitstore-api
    ports:
      - "4000:4000"  # GraphQL API
      - "5000:5000"  # Git smart HTTP
    depends_on:
      git-service:
        condition: service_started
    environment:
      - GITSTORE_API_PORT=4000
      - GITSTORE_API__GIT_PORT=5000
      - GITSTORE_GIT__GRPC__URI=dns:///git-service:50051
      - GITSTORE_AUTH__ADMIN__USERNAME=${GITSTORE_AUTH__ADMIN__USERNAME:-admin}
      - GITSTORE_AUTH__ADMIN__PASSWORD_HASH=${GITSTORE_AUTH__ADMIN__PASSWORD_HASH}
      - GITSTORE_AUTH__JWT__SECRET=${GITSTORE_AUTH__JWT__SECRET}
      - GITSTORE_CACHE__TTL=300
      - GITSTORE_LOG__LEVEL=info
      - GITSTORE_LOG__FORMAT=json
    networks:
      - gitstore-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

volumes:
  git-repo-data-root:
    driver: local

networks:
  gitstore-network:
    driver: bridge

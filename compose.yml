services:
  git-server:
    build:
      context: ./git-server
      dockerfile: Dockerfile
    container_name: gitstore-git-server
    ports:
      - "9418:9418"  # Git protocol
      - "8080:8080"  # Websocket notifications
    volumes:
      - git-data:/data/repos
    environment:
      - GITSTORE_GIT_PORT=9418
      - GITSTORE_WS_PORT=8080
      - GITSTORE_DATA_DIR=/data/repos
      - GITSTORE_LOG_LEVEL=info
      - GITSTORE_MAX_FILE_SIZE=52428800
    networks:
      - gitstore-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9418"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gitstore-api
    ports:
      - "4000:4000"  # GraphQL API
    depends_on:
      git-server:
        condition: service_healthy
    environment:
      - GITSTORE_API_PORT=4000
      - GITSTORE_GIT_WS=ws://git-server:8080
      - GITSTORE_GIT_REPO=git://git-server:9418/catalog.git
      - GITSTORE_CACHE_TTL=300
      - GITSTORE_LOG_LEVEL=info
    networks:
      - gitstore-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-ui:
    build:
      context: .
      dockerfile: docker/admin-ui.Dockerfile
    container_name: gitstore-admin-ui
    ports:
      - "3000:3000"  # Admin UI
    depends_on:
      api:
        condition: service_healthy
    environment:
      - GITSTORE_GRAPHQL_URL=http://api:4000/graphql
      - GITSTORE_AUTH_SECRET=change-me-in-production
      - GITSTORE_SESSION_TIMEOUT=3600
    networks:
      - gitstore-network

volumes:
  git-data:
    driver: local

networks:
  gitstore-network:
    driver: bridge

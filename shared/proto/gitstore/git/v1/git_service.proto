// GitStore gRPC Git Service contract — v1 (010-repo-storage-identity revision)
//
// Changes from 007 baseline:
//   - `repository_id` semantics clarified: the field now carries an opaque
//     UUIDv7 (the internal repo_id), never a namespace-path string.
//     gitstore-git-service MUST NOT interpret this value as a filesystem path
//     component directly; it MUST derive the path using the fanout formula.
//   - `CreateRepository` request gains `storage_class` field (optional, default
//     "default") to support future multi-storage-root routing.
//   - `CreateRepository` response gains `storage_path` field (informational).
//   - No field numbers, RPCs, or status codes removed (additive only).
//
// Path derivation (gitstore-git-service internal):
//   repo_id  = "0196f3a2-4b1c-7e9d-a301-8b2c4d5e6f7a"
//   hex      = "0196f3a24b1c7e9da3018b2c4d5e6f7a"
//   path     = {data_dir}/01/96/0196f3a2-4b1c-7e9d-a301-8b2c4d5e6f7a.git

syntax = "proto3";

package gitstore.git.v1;

option go_package = "github.com/gitstore-dev/gitstore/api/gen/gitstore/git/v1;gitv1";

// GitService provides raw git primitive operations over gRPC.
// All operations are scoped to a repository identified by its stable repo_id (UUIDv7).
// Callers (gitstore-api) MUST resolve namespace/name → repo_id before calling any RPC.
// gitstore-git-service never receives or interprets namespace strings.
service GitService {
  // ── Repository lifecycle ───────────────────────────────────────────────────

  // CreateRepository provisions a new, empty bare repository at the fanout path.
  // Returns ALREADY_EXISTS if a repository with the given repo_id already exists on disk.
  rpc CreateRepository(CreateRepositoryRequest) returns (CreateRepositoryResponse);

  // DeleteRepository removes the repository directory and all its data.
  // Returns NOT_FOUND if the repository does not exist.
  rpc DeleteRepository(DeleteRepositoryRequest) returns (DeleteRepositoryResponse);

  // ── Read operations ────────────────────────────────────────────────────────

  // GetFile returns the raw bytes of a single file at the given ref.
  rpc GetFile(GetFileRequest) returns (GetFileResponse);

  // GetFileStream returns a file as a stream of byte chunks.
  // Use for files larger than 1 MiB to avoid message size limits.
  rpc GetFileStream(GetFileStreamRequest) returns (stream GetFileStreamResponse);

  // ListFiles enumerates file paths under an optional prefix at the given ref.
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);

  // ── Write operations ───────────────────────────────────────────────────────

  // CommitFile writes a single file and commits it to the default branch.
  rpc CommitFile(CommitFileRequest) returns (CommitFileResponse);

  // DeleteFile removes a file and commits the deletion to the default branch.
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);

  // ── Tag operations ─────────────────────────────────────────────────────────

  // CreateTag creates an annotated tag on HEAD (or the specified commit).
  rpc CreateTag(CreateTagRequest) returns (CreateTagResponse);

  // ListTags enumerates tags with an optional prefix filter.
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);

  // GetLatestTag returns the latest semver release tag by version ordering.
  rpc GetLatestTag(GetLatestTagRequest) returns (GetLatestTagResponse);
}

// ─── Repository lifecycle messages ────────────────────────────────────────────

message CreateRepositoryRequest {
  // repository_id is the stable UUIDv7 for the new repository.
  // Must be a valid 36-char hyphenated UUID. Must not contain path separators.
  string repository_id = 1;

  // storage_class is an optional routing hint for future multi-root storage.
  // Defaults to "default" when empty.
  string storage_class = 2;
}

message CreateRepositoryResponse {
  string repository_id = 1;
  // storage_path is the absolute filesystem path where the repository was created.
  // Informational only — callers must not depend on this for routing.
  string storage_path  = 2;
}

message DeleteRepositoryRequest {
  // repository_id is the stable UUIDv7 of the repository to remove.
  string repository_id = 1;
}

message DeleteRepositoryResponse {
  string repository_id = 1;
}

// ─── Read messages ─────────────────────────────────────────────────────────────

message GetFileRequest {
  // repository_id is the stable UUIDv7. See service-level contract note.
  string repository_id = 15;

  // path is the file path relative to the repository root.
  string path = 1;
  // ref is a tag name, branch name, or full commit SHA.
  string ref  = 2;
}

message GetFileResponse {
  string path       = 1;
  bytes  content    = 2; // raw file bytes; UTF-8 for markdown but treated opaque
  string blob_sha   = 3; // 40-char hex SHA-1
  uint64 size_bytes = 4;
}

message GetFileStreamRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  // path is the file path relative to the repository root.
  string path = 1;
  // ref is a tag name, branch name, or full commit SHA.
  string ref  = 2;
}

message GetFileStreamResponse {
  uint32 chunk_index = 1;
  bytes  data        = 2; // max 256 KiB per chunk
  bool   is_last     = 3;
}

message ListFilesRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  string ref         = 1;
  string path_prefix = 2; // empty = repo root; e.g. "products/"
  bool   recursive   = 3; // default true
}

message ListFilesResponse {
  repeated FileEntry files          = 1;
  string             ref_commit_sha = 2; // commit SHA the ref resolved to
}

message FileEntry {
  string path       = 1;
  uint64 size_bytes = 2;
  string blob_sha   = 3;
}

// ─── Write messages ────────────────────────────────────────────────────────────

message CommitFileRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  string path           = 1;
  bytes  content        = 2;
  string commit_message = 3;
  string author_name    = 4;
  string author_email   = 5;
}

message CommitFileResponse {
  string commit_sha = 1; // 40-char hex
  string branch     = 2; // branch the commit was applied to
}

message DeleteFileRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  string path           = 1;
  string commit_message = 2;
  string author_name    = 3;
  string author_email   = 4;
}

message DeleteFileResponse {
  string commit_sha = 1;
}

// ─── Tag messages ──────────────────────────────────────────────────────────────

message CreateTagRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  string tag_name          = 1; // semver e.g. "v1.2.0"
  string message           = 2; // annotated tag message
  string target_commit_sha = 3; // empty = HEAD
}

message CreateTagResponse {
  string tag_name = 1;
  string tag_sha  = 2; // tag object SHA
}

message ListTagsRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  string prefix = 1; // e.g. "v"; empty = all tags
}

message ListTagsResponse {
  repeated TagEntry tags = 1;
}

message GetLatestTagRequest {
  // repository_id identifies the target repository.
  string repository_id = 15;

  string prefix = 1; // default "v"
}

message GetLatestTagResponse {
  TagEntry tag   = 1;
  bool     found = 2; // false if no matching tags exist
}

message TagEntry {
  string name       = 1; // short name e.g. "v1.2.0"
  string commit_sha = 2; // peeled commit SHA
  string message    = 3; // annotated tag message; empty for lightweight tags
}

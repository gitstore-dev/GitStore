// GitStore gRPC Git Service contract — v1 (012-smart-http-api revision)
//
// Changes from 010 baseline:
//   - Added `InfoRefs` RPC: returns the ref advertisement for upload-pack or
//     receive-pack without a PACK transfer.
//   - Added `ReceivePack` RPC: client-streaming push; transfers PACK data in
//     chunks to avoid buffering the full packfile in memory.
//   - Added `UploadPack` RPC: server-streaming clone/fetch; streams the PACK
//     response back in chunks.
//   - Added `Service` enum, `InfoRefsRequest`, `InfoRefsResponse`,
//     `ReceivePackChunk`, `ReceivePackResponse`, `UploadPackRequest`,
//     `UploadPackChunk` messages.
//   - `repository_id` field convention (field 15) preserved for all new
//     request messages, consistent with the 010 baseline.
//   - No existing RPCs, messages, or field numbers removed (additive only).
//
// Streaming conventions:
//   ReceivePack (client-streaming):
//     - First chunk: repository_id + ref_commands + first pack_data bytes
//     - Subsequent chunks: pack_data only
//     - Final chunk: is_last = true
//     - On any stream error: git-service discards quarantine atomically
//   UploadPack (server-streaming):
//     - Request: single message with repository_id + full want/have body
//     - Response chunks: sideband-encoded pkt-line bytes, 64 KiB max each
//     - Final chunk: is_last = true

syntax = "proto3";

package gitstore.git.v1;

option go_package = "github.com/gitstore-dev/gitstore/api/gen/gitstore/git/v1;gitv1";

// GitService provides raw git primitive operations over gRPC.
// All operations are scoped to a repository identified by its stable repo_id (UUIDv7).
// Callers (gitstore-api) MUST resolve namespace/name → repo_id before calling any RPC.
// gitstore-git-service never receives or interprets namespace strings.
service GitService {
  // ── Repository lifecycle ───────────────────────────────────────────────────

  // CreateRepository provisions a new, empty bare repository at the fanout path.
  rpc CreateRepository(CreateRepositoryRequest) returns (CreateRepositoryResponse);

  // DeleteRepository removes the repository directory and all its data.
  rpc DeleteRepository(DeleteRepositoryRequest) returns (DeleteRepositoryResponse);

  // ── Git smart HTTP transport ───────────────────────────────────────────────

  // InfoRefs returns the ref advertisement for the given service.
  // Used by gitstore-api to serve GET /info/refs?service=... requests.
  rpc InfoRefs(InfoRefsRequest) returns (InfoRefsResponse);

  // ReceivePack handles a git push. The client streams pack data in chunks.
  // The first chunk MUST contain repository_id and ref_commands.
  // gitstore-git-service stages objects in quarantine and promotes them
  // atomically only after all chunks are received and refs validated.
  // On stream error, quarantine is discarded and no objects are promoted.
  rpc ReceivePack(stream ReceivePackChunk) returns (ReceivePackResponse);

  // UploadPack handles a git clone or fetch. The full want/have negotiation
  // body is sent in a single request; the PACK response is streamed back.
  rpc UploadPack(UploadPackRequest) returns (stream UploadPackChunk);

  // ── Read operations ────────────────────────────────────────────────────────

  // GetFile returns the raw bytes of a single file at the given ref.
  rpc GetFile(GetFileRequest) returns (GetFileResponse);

  // GetFileStream returns a file as a stream of byte chunks.
  rpc GetFileStream(GetFileStreamRequest) returns (stream GetFileStreamResponse);

  // ListFiles enumerates file paths under an optional prefix at the given ref.
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);

  // ── Write operations ───────────────────────────────────────────────────────

  // CommitFile writes a single file and commits it to the default branch.
  rpc CommitFile(CommitFileRequest) returns (CommitFileResponse);

  // DeleteFile removes a file and commits the deletion to the default branch.
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);

  // ── Tag operations ─────────────────────────────────────────────────────────

  // CreateTag creates an annotated tag on HEAD (or the specified commit).
  rpc CreateTag(CreateTagRequest) returns (CreateTagResponse);

  // ListTags enumerates tags with an optional prefix filter.
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);

  // GetLatestTag returns the latest semver release tag by version ordering.
  rpc GetLatestTag(GetLatestTagRequest) returns (GetLatestTagResponse);
}

// ─── Git smart HTTP transport messages ────────────────────────────────────────

// Service identifies which git smart HTTP service an InfoRefs or pack RPC targets.
enum Service {
  SERVICE_UNSPECIFIED    = 0;
  GIT_UPLOAD_PACK        = 1; // clone / fetch
  GIT_RECEIVE_PACK       = 2; // push
}

message InfoRefsRequest {
  // repository_id is the stable UUIDv7 of the target repository.
  string repository_id = 15;

  // service identifies whether this is an upload-pack or receive-pack advertisement.
  Service service = 1;
}

message InfoRefsResponse {
  // advertisement is the complete pkt-line ref advertisement bytes, ready to
  // be written verbatim into the HTTP response body.
  bytes   advertisement = 1;

  // service echoes the request service for HTTP Content-Type header selection.
  Service service       = 2;
}

// ReceivePackChunk is one chunk of a client-streaming git push.
message ReceivePackChunk {
  // repository_id MUST be set on the first chunk only. Ignored on subsequent chunks.
  string repository_id = 15;

  // ref_commands MUST be set on the first chunk only.
  // Contains all ref-update instructions parsed from the pkt-line section of the push body.
  repeated RefCommand ref_commands = 1;

  // pack_data contains raw PACK bytes for this chunk. May be empty on the first
  // chunk if the ref-update section exhausted the initial HTTP read buffer.
  bytes pack_data = 2;

  // is_last signals that this is the final chunk. The git service finalises
  // pack indexing and proceeds to ref validation upon receiving this flag.
  bool is_last = 3;
}

// RefCommand represents one ref-update instruction from a git push.
message RefCommand {
  string old_oid  = 1; // zero OID ("0000...0") means the ref does not exist yet
  string new_oid  = 2; // zero OID means delete the ref
  string ref_name = 3; // e.g. "refs/heads/main"
}

// ReceivePackResponse is returned after all ReceivePackChunk messages are received.
message ReceivePackResponse {
  // report_status contains the complete pkt-line report-status payload, ready
  // to be written verbatim into the HTTP response body.
  bytes report_status = 1;
}

// UploadPackRequest carries the full want/have negotiation body from the git client.
message UploadPackRequest {
  // repository_id is the stable UUIDv7 of the target repository.
  string repository_id = 15;

  // body is the complete pkt-line payload (want/have lines + flush) from the git client.
  bytes body = 1;
}

// UploadPackChunk is one chunk of the server-streaming PACK response.
message UploadPackChunk {
  uint32 chunk_index = 1;
  // data contains sideband-encoded pkt-line bytes; max 64 KiB per chunk.
  bytes  data        = 2;
  bool   is_last     = 3;
}

// ─── Repository lifecycle messages ────────────────────────────────────────────

message CreateRepositoryRequest {
  string repository_id = 1;
  string storage_class = 2;
}

message CreateRepositoryResponse {
  string repository_id = 1;
  string storage_path  = 2;
}

message DeleteRepositoryRequest {
  string repository_id = 1;
}

message DeleteRepositoryResponse {
  string repository_id = 1;
}

// ─── Read messages ─────────────────────────────────────────────────────────────

message GetFileRequest {
  string repository_id = 15;
  string path = 1;
  string ref  = 2;
}

message GetFileResponse {
  string path       = 1;
  bytes  content    = 2;
  string blob_sha   = 3;
  uint64 size_bytes = 4;
}

message GetFileStreamRequest {
  string repository_id = 15;
  string path = 1;
  string ref  = 2;
}

message GetFileStreamResponse {
  uint32 chunk_index = 1;
  bytes  data        = 2;
  bool   is_last     = 3;
}

message ListFilesRequest {
  string repository_id = 15;
  string ref         = 1;
  string path_prefix = 2;
  bool   recursive   = 3;
}

message ListFilesResponse {
  repeated FileEntry files          = 1;
  string             ref_commit_sha = 2;
}

message FileEntry {
  string path       = 1;
  uint64 size_bytes = 2;
  string blob_sha   = 3;
}

// ─── Write messages ────────────────────────────────────────────────────────────

message CommitFileRequest {
  string repository_id  = 15;
  string path           = 1;
  bytes  content        = 2;
  string commit_message = 3;
  string author_name    = 4;
  string author_email   = 5;
}

message CommitFileResponse {
  string commit_sha = 1;
  string branch     = 2;
}

message DeleteFileRequest {
  string repository_id  = 15;
  string path           = 1;
  string commit_message = 2;
  string author_name    = 3;
  string author_email   = 4;
}

message DeleteFileResponse {
  string commit_sha = 1;
}

// ─── Tag messages ──────────────────────────────────────────────────────────────

message CreateTagRequest {
  string repository_id     = 15;
  string tag_name          = 1;
  string message           = 2;
  string target_commit_sha = 3;
}

message CreateTagResponse {
  string tag_name = 1;
  string tag_sha  = 2;
}

message ListTagsRequest {
  string repository_id = 15;
  string prefix = 1;
}

message ListTagsResponse {
  repeated TagEntry tags = 1;
}

message GetLatestTagRequest {
  string repository_id = 15;
  string prefix = 1;
}

message GetLatestTagResponse {
  TagEntry tag   = 1;
  bool     found = 2;
}

message TagEntry {
  string name       = 1;
  string commit_sha = 2;
  string message    = 3;
}

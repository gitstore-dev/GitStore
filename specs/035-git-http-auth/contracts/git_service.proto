// GitStore gRPC Git Service contract — v1 (035-git-http-auth revision)
//
// Changes from 012-smart-http-api baseline:
//   - Added `PushContext` message: immutable push context attached to the
//     first chunk of every ReceivePackRequest stream.
//   - Added `AuthContext` message: sanitised principal identity snapshot.
//   - Added `PushPolicy` message: per-repository push limits resolved from
//     the Repository datastore record.
//   - Extended `ReceivePackRequest`: added `push_context` at field 4
//     (MUST be set on the first chunk only; proto3 encoding: 1-byte tag).
//   - No existing RPCs, messages, or field numbers removed (additive only).
//
// PushContext conventions:
//   - Set on the first ReceivePackRequest chunk only; absent on all subsequent chunks.
//   - `repository_id` inside PushContext MUST match `repository_id` field 15
//     on the same chunk. git-service MUST reject the stream if they differ (FR-011).
//   - `config_resource_version` is an opaque audit tag; git-service logs it
//     but does not interpret it.
//   - Zero values for PushPolicy limit fields mean "no limit enforced" (FR-015).

syntax = "proto3";

package gitstore.git.v1;

option go_package = "github.com/gitstore-dev/gitstore/api/gen/gitstore/git/v1;gitv1";

// ─── Push context messages (035-git-http-auth) ────────────────────────────────

// AuthContext is a sanitised snapshot of the authenticated principal's identity.
// It MUST NOT carry raw credentials, tokens, or password hashes.
message AuthContext {
  // subject is the principal identifier (e.g. "admin", OIDC sub claim).
  string subject = 1;

  // issuer identifies the auth provider (e.g. "static-admin", OIDC issuer URL).
  string issuer = 2;

  // auth_method is the mechanism used (e.g. "basic", "bearer", "none").
  string auth_method = 3;

  repeated string roles  = 4;
  repeated string groups = 5;
  repeated string scopes = 6;
}

// PushPolicy carries per-repository push limits resolved from the Repository
// datastore record. A zero value for any limit field means "no limit enforced".
message PushPolicy {
  // max_pack_size_bytes is the maximum total pack size for this push.
  // 0 = unlimited.
  int64 max_pack_size_bytes = 1;

  // max_file_size_bytes is the maximum size of any single blob in the pack.
  // 0 = unlimited.
  int64 max_file_size_bytes = 2;
}

// PushContext is attached to the first chunk of every ReceivePackRequest stream.
// It is immutable for the lifetime of the stream — policy changes during an
// in-progress push take effect only on subsequent pushes.
message PushContext {
  // namespace is the human-readable namespace identifier.
  string namespace = 1;

  // repository_name is the human-readable repository name within the namespace.
  string repository_name = 2;

  // repository_id is the stable UUIDv7 of the target repository.
  // MUST match the repository_id field on the enclosing ReceivePackRequest chunk.
  string repository_id = 3;

  // config_resource_version is an opaque audit tag recording which policy
  // version was in effect when this stream was opened.
  string config_resource_version = 4;

  // actor is the sanitised identity of the authenticated principal.
  AuthContext actor = 5;

  // policy carries the resolved push limits for this repository.
  PushPolicy policy = 6;
}

// ─── Git smart HTTP transport messages ────────────────────────────────────────

enum Service {
  SERVICE_UNSPECIFIED      = 0;
  SERVICE_GIT_UPLOAD_PACK  = 1;
  SERVICE_GIT_RECEIVE_PACK = 2;
}

message InfoRefsRequest {
  string  repository_id = 15;
  Service service       = 1;
}

message InfoRefsResponse {
  bytes   advertisement = 1;
  Service service       = 2;
}

// ReceivePackRequest is one chunk of a client-streaming git push.
message ReceivePackRequest {
  // repository_id MUST be set on the first chunk only.
  string repository_id = 15;

  // ref_commands MUST be set on the first chunk only.
  repeated RefCommand ref_commands = 1;

  // pack_data contains raw PACK bytes for this chunk.
  bytes pack_data = 2;

  // is_last signals that this is the final chunk.
  bool is_last = 3;

  // push_context MUST be set on the first chunk only.
  // git-service MUST reject the stream if this field is absent on the first chunk.
  // git-service MUST reject the stream if push_context.repository_id !=
  // this chunk's repository_id field.
  PushContext push_context = 4;
}

message RefCommand {
  string old_oid  = 1;
  string new_oid  = 2;
  string ref_name = 3;
}

message ReceivePackResponse {
  bytes report_status = 1;
}

message UploadPackRequest {
  string repository_id = 15;
  bytes  body          = 1;
}

message UploadPackResponse {
  uint32 chunk_index = 1;
  bytes  data        = 2;
  bool   is_last     = 3;
}

// ─── (all other messages unchanged from 012-smart-http-api baseline) ─────────
// CreateRepositoryRequest, CreateRepositoryResponse, DeleteRepositoryRequest,
// DeleteRepositoryResponse, GetFileRequest, GetFileResponse,
// GetFileStreamRequest, GetFileStreamResponse, ListFilesRequest,
// ListFilesResponse, FileEntry, CommitFileRequest, CommitFileResponse,
// DeleteFileRequest, DeleteFileResponse, CreateTagRequest, CreateTagResponse,
// ListTagsRequest, ListTagsResponse, GetLatestTagRequest,
// GetLatestTagResponse, TagEntry — omitted for brevity; include verbatim
// from shared/proto/gitstore/git/v1/git_service.proto.

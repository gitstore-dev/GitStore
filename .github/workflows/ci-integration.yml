name: CI Integration

# Runs ONLY when files relevant to the gRPC/datastore contracts or service implementations change.
# This workflow is NOT a required branch-protection status check.
# Core CI (ci.yml) gates merge; these tests provide deeper validation when warranted.

on:
  push:
    branches: [ main, 'feature/**', '[0-9]+-*' ]
    paths:
      - 'gitstore-api/**'
      - 'gitstore-git-service/**'
      - 'shared/proto/**'
      - 'docker/git-service.Dockerfile'
      - 'docker/api.Dockerfile'
      - 'compose.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'gitstore-api/**'
      - 'gitstore-git-service/**'
      - 'shared/proto/**'
      - 'docker/git-service.Dockerfile'
      - 'docker/api.Dockerfile'
      - 'compose.yml'

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: tests/integration/go.sum

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Build and start core stack
      run: docker compose up -d --build
      env:
        GITSTORE_GIT__DATA_DIR: ./data/repos
        # Stub credentials — integration tests exercise the API but don't verify auth secrets
        GITSTORE_AUTH__ADMIN__USERNAME: admin
        GITSTORE_AUTH__ADMIN__PASSWORD_HASH: "$2a$10$awdOeTC5BhJGSasW9EdvO.4wnP7SbC96ycmbPx5dxIxEdbHye6eOy"
        GITSTORE_AUTH__JWT__SECRET: ci-test-jwt-secret-minimum-32-characters-long

    - name: Wait for services to be healthy
      run: |
        echo "Waiting for gitstore-api (GraphQL + git HTTP)..."
        timeout 60 sh -c 'until curl -sf http://localhost:4000/health; do sleep 2; done'
        timeout 60 sh -c 'until curl -sf http://localhost:5000/health; do sleep 2; done'
        docker compose ps

    - name: Bootstrap namespace and repository
      run: make bootstrap ADMIN_PASSWORD=admin123 NAMESPACE=gitci NAMESPACE_DISPLAY_NAME=CI NAMESPACE_TIER=USER REPOSITORY=catalog

    - name: Run integration tests
      working-directory: ./tests/integration
      env:
        NAMESPACE: gitci
        REPOSITORY: catalog
      run: go test -v -timeout 120s ./...

    - name: Collect logs on failure
      if: failure()
      run: docker compose logs

    - name: Cleanup
      if: always()
      run: docker compose down -v

  datastore-contract-test:
    name: Datastore Contract Tests (memdb)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: gitstore-api/go.sum

    - name: Run datastore contract tests
      working-directory: ./gitstore-api
      run: go test -v -race -timeout 120s ./tests/contract/datastore/...

  datastore-contract-test-scylla:
    name: Datastore Contract Tests (ScyllaDB)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: gitstore-api/go.sum

    - name: Start ScyllaDB
      run: |
        docker run -d --name gitstore-scylla-test \
          -p 9042:9042 \
          scylladb/scylla:5.4 \
          --developer-mode=1 --overprovisioned=1 --smp=1
        timeout 120 sh -c 'until docker exec gitstore-scylla-test cqlsh -e "describe cluster"; do sleep 2; done'

    - name: Run ScyllaDB contract tests
      working-directory: ./gitstore-api
      env:
        GITSTORE_TEST_SCYLLA_ADDR: 127.0.0.1:9042
      run: go test -tags scylla -v -timeout 120s ./tests/contract/datastore/... ./internal/datastore/scylla/...

    - name: Stop ScyllaDB
      if: always()
      run: docker rm -f gitstore-scylla-test || true

  grpc-contract-test:
    name: gRPC Contract Tests (testcontainers)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: gitstore-api/go.sum

    - name: Build git-service Docker image
      run: docker build -f docker/git-service.Dockerfile -t gitstore-git-service:latest .

    - name: Run gRPC contract tests
      working-directory: ./gitstore-api
      run: go test -tags grpc -v -timeout 5m ./tests/contract/grpc/...

# Product Mutations

mutation CreateProduct($input: CreateProductInput!) {
  createProduct(input: $input) {
    clientMutationId
    product {
      id
      title
      sku
      price
      compareAtPrice
      inventoryStatus
      inventoryQuantity
      description
      categoryId
      collectionIds
      images
      metadata
      createdAt
      updatedAt
      version
    }
  }
}

mutation UpdateProduct($input: UpdateProductInput!) {
  updateProduct(input: $input) {
    clientMutationId
    product {
      id
      title
      sku
      price
      compareAtPrice
      inventoryStatus
      inventoryQuantity
      description
      categoryId
      collectionIds
      images
      metadata
      createdAt
      updatedAt
      version
    }
    conflict {
      field
      currentValue
      incomingValue
      diff
    }
  }
}

mutation DeleteProduct($input: DeleteProductInput!) {
  deleteProduct(input: $input) {
    clientMutationId
    deletedProductId
  }
}

